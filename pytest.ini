[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --html=reports/report.html
    --self-contained-html
    --screenshot=only-on-failure
    --video=retain-on-failure
    --headed
    --browser=chromium
    -v
    --timeout=120
markers =
    smoke: Tests de humo - verificacion basica del sistema
    regression: Tests de regresion completos
    monitor: Tests del modulo Monitor
    reports: Tests del modulo Reportes
    config: Tests del modulo Configuracion
    campaigns: Tests del modulo Campanas
    login: Tests de login y autenticacion
    admin: Tests que usan el perfil Administrador (usuario cyt)
    supervisor: Tests que usan el perfil Supervisor (creado por FRW)
    agente: Tests que usan el perfil Agente (usuario 1001)
    frameworks: Tests del modulo Orion Contact Center Frameworks (puerto 444)
